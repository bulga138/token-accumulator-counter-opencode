name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: false

jobs:
  # 1. Create an empty draft release (only once)
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    permissions:
      contents: write
    steps:
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v3.0.0
        with:
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Build binaries for all targets (parallel)
  build:
    needs: create-release
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os_name: linux
            arch: x64
            bun_target: bun-linux-x64
          - target: linux-arm64
            os_name: linux
            arch: arm64
            bun_target: bun-linux-arm64
          - target: windows-x64
            os_name: windows
            arch: x64
            bun_target: bun-windows-x64
          - target: macos-x64
            os_name: macos
            arch: x64
            bun_target: bun-darwin-x64
          - target: macos-arm64
            os_name: macos
            arch: arm64
            bun_target: bun-darwin-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Build executable
        run: |
          bun build ./bin/taco.ts --outfile ./taco --target ${{ matrix.bun_target }} --compile --define "TACO_VERSION='${VERSION}'" --minify --bytecode --sourcemap 
          if [ ! -f taco ] && [ ! -f taco.exe ]; then
            echo "ERROR: Binary not created"
            exit 1
          fi

      - name: Make executable
        run: chmod +x taco taco.exe 2>/dev/null || true

      - name: Compress with UPX (linux-x64)
        if: matrix.target == 'linux-x64'
        uses: crazy-max/ghaction-upx@v4
        with:
          version: v4.2.4
          files: ./taco
          args: --best
        continue-on-error: true

      - name: Rename binary
        run: |
          mv taco taco.exe 2>/dev/null || true
          mv taco.exe "taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"

      - name: Generate checksum
        run: |
          BINARY="taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          sha256sum "$BINARY" > "$BINARY.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v3.0.0
        with:
          release_id: ${{ needs.create-release.outputs.release_id }}
          files: taco-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
