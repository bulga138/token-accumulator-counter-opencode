name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os_name: linux
            arch: x64
            bun_target: bun-linux-x64
          - target: linux-arm64
            os_name: linux
            arch: arm64
            bun_target: bun-linux-arm64
          - target: windows-x64
            os_name: windows
            arch: x64
            bun_target: bun-windows-x64
          - target: macos-x64
            os_name: macos
            arch: x64
            bun_target: bun-darwin-x64
          - target: macos-arm64
            os_name: macos
            arch: arm64
            bun_target: bun-darwin-arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set VERSION env
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Build executable
        run: |
          bun build ./bin/taco.ts --outfile ./taco --target ${{ matrix.bun_target }} --compile --define "TACO_VERSION='${VERSION}'" --minify --bytecode --sourcemap 
          if [ ! -f taco ] && [ ! -f taco.exe ]; then
            echo "ERROR: Binary 'taco' or 'taco.exe' not created after bun build"
            exit 1
          fi

      - name: Make executable
        run: chmod +x taco taco.exe 2>/dev/null || true

      - name: Compress with UPX
        if: matrix.target == 'linux-x64'
        uses: crazy-max/ghaction-upx@v4
        with:
          version: v4.2.4
          files: ./taco
          args: --best
        continue-on-error: true

      - name: Rename
        run: |
          mv taco taco.exe 2>/dev/null || true
          mv taco.exe taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}

      - name: Generate checksum
        run: |
          BINARY="taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}"
          sha256sum "$BINARY" > "$BINARY.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: taco-*
          generate_release_notes: ${{ matrix.target == 'linux-x64' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
