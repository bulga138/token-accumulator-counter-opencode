name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            os_name: linux
            arch: x64
            ext: ''
          - os: windows-latest
            target: windows-x64
            os_name: windows
            arch: x64
            ext: '.exe'
          - os: macos-13
            target: macos-x64
            os_name: macos
            arch: x64
            ext: ''
          - os: macos-14
            target: macos-arm64
            os_name: macos
            arch: arm64
            ext: ''
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Create standalone executable
        run: |
          bun run bundle
        shell: bash

      - name: Make executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x taco

      - name: Compress with UPX
        if: matrix.os == 'ubuntu-latest'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: v4.2.4
          files: |
            ./taco
          args: --best
        continue-on-error: true

      - name: Rename executable
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv taco "taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
        shell: bash

      - name: Generate checksum
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BINARY="taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          CHECKSUM_FILE="taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}.sha256"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$BINARY" > "$CHECKSUM_FILE"
          else
            shasum -a 256 "$BINARY" > "$CHECKSUM_FILE"
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            taco-v*-*
            taco-*.sha256

  create-source-archive:
    name: Create Source Archive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create source archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf "taco-release-${VERSION}.tar.gz" \
            dist/ \
            bin/ \
            install.sh \
            install.ps1 \
            uninstall.sh \
            uninstall.ps1 \
            update.sh \
            README.md \
            package.json \
            LICENSE 2>/dev/null || true

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: taco-release-*.tar.gz

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          chmod +x scripts/generate-changelog.sh
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CHANGELOG=$(./scripts/generate-changelog.sh "$PREV_TAG")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    needs: [build, create-source-archive, generate-changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body: ${{ needs.generate-changelog.outputs.changelog }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.sha256
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
