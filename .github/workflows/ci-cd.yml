name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v0.1.2)'
        required: true
        type: string

jobs:
  # Quick smoke test - pnpm on Ubuntu (primary package manager)
  test:
    name: Test (pnpm + Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9
          run_install: false

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm test

  # Bun test (different runtime, worth keeping)
  test-bun:
    name: Test (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  # Build and release binaries for all platforms
  build-and-release:
    name: Build ${{ matrix.target }}
    needs: [test, test-bun]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            os_name: linux
            arch: x64
            ext: ''
          - os: windows-latest
            target: windows-x64
            os_name: windows
            arch: x64
            ext: '.exe'
          - os: macos-13
            target: macos-x64
            os_name: macos
            arch: x64
            ext: ''
          - os: macos-14
            target: macos-arm64
            os_name: macos
            arch: arm64
            ext: ''
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.x'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Create standalone executable
        run: |
          bun run bundle
        shell: bash

      - name: Make executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x taco

      - name: Compress with UPX
        if: matrix.os != 'windows-latest'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: v4.2.4
          files: |
            ./taco
          args: --best
        continue-on-error: true

      - name: Rename executable
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          mv taco "taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
        shell: bash

      - name: Upload executable to release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: taco-v*-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksum
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          BINARY="taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.ext }}"
          CHECKSUM_FILE="taco-${VERSION}-${{ matrix.os_name }}-${{ matrix.arch }}.sha256"
          # sha256sum is Linux-only; macOS uses shasum -a 256
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$BINARY" > "$CHECKSUM_FILE"
          else
            shasum -a 256 "$BINARY" > "$CHECKSUM_FILE"
          fi
          cat "$CHECKSUM_FILE"
        shell: bash

      - name: Upload checksum
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: taco-*.sha256
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create source archive for install scripts
  create-source-archive:
    name: Create Source Archive
    needs: [test, test-bun]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create source archive
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          tar -czf "taco-release-${VERSION}.tar.gz" \
            dist/ \
            bin/ \
            install.sh \
            install.ps1 \
            uninstall.sh \
            uninstall.ps1 \
            update.sh \
            README.md \
            package.json \
            LICENSE 2>/dev/null || true

      - name: Upload source archive
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: taco-release-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
