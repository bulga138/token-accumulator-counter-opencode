name: CI/CD

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9
          run_install: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm test

  test-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  build-and-release:
    needs: [test, test-bun]
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ''
          - os: windows-latest
            target: windows-x64
            ext: '.exe'
          - os: macos-latest
            target: macos-x64
            ext: ''
          - os: macos-14
            target: macos-arm64
            ext: ''
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.x'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Create standalone executable
        run: |
          bun run bundle
        shell: bash

      - name: Make executable (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x taco

      - name: Rename executable
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv taco "taco-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
        shell: bash

      - name: Upload executable to release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: taco-v*-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-source-archive:
    needs: [test, test-bun]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Create source archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czf "taco-release-${VERSION}.tar.gz" \
            dist/ \
            bin/ \
            install.sh \
            install.ps1 \
            uninstall.sh \
            update.sh \
            README.md \
            package.json \
            LICENSE 2>/dev/null || true

      - name: Upload source archive
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: taco-release-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
