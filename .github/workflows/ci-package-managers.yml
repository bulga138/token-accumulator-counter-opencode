name: Package Manager Compatibility

on:
  push:
    branches: [master]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci-package-managers.yml'
  pull_request:
    branches: [master]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      node_versions:
        description: 'Node versions to test (comma-separated, e.g., 20,22,24)'
        required: false
        default: '20,22,24'
      package_managers:
        description: 'Package managers to test (comma-separated, e.g., npm,pnpm,yarn)'
        required: false
        default: 'npm,pnpm,yarn'

jobs:
  test-package-managers:
    name: Test ${{ matrix.package-manager }} + Node ${{ matrix.node-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22, 24]
        package-manager: [npm, pnpm, yarn]
        exclude:
          # Skip yarn on Windows to reduce matrix size (yarn is less common on Windows)
          - os: windows-latest
            package-manager: yarn
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup ${{ matrix.package-manager }}
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm --version
              ;;
            pnpm)
              npm install -g pnpm@9
              pnpm --version
              ;;
            yarn)
              npm install -g yarn@1
              yarn --version
              ;;
          esac
        shell: bash

      - name: Install dependencies (${{ matrix.package-manager }})
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              # Generate package-lock.json from pnpm-lock.yaml (pnpm is canonical lockfile)
              npm install --package-lock-only --ignore-scripts
              npm ci
              ;;
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            yarn)
              # Generate yarn.lock from package.json (pnpm is canonical lockfile)
              yarn install --no-immutable 2>/dev/null || yarn install
              ;;
          esac
        shell: bash

      - name: Run type check
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm run typecheck
              ;;
            pnpm)
              pnpm run typecheck
              ;;
            yarn)
              yarn typecheck
              ;;
          esac
        shell: bash

      - name: Run tests
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm test
              ;;
            pnpm)
              pnpm test
              ;;
            yarn)
              yarn test
              ;;
          esac
        shell: bash

      - name: Run build
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm run build
              ;;
            pnpm)
              pnpm run build
              ;;
            yarn)
              yarn build
              ;;
          esac
        shell: bash

      - name: Run lint
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm run lint || echo "Lint not configured for npm"
              ;;
            pnpm)
              pnpm run lint
              ;;
            yarn)
              yarn lint || echo "Lint not configured for yarn"
              ;;
          esac
        shell: bash
        continue-on-error: true

  test-install-scripts:
    name: Test Install Scripts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '20.x'

      - name: Test install.sh syntax (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          bash -n install.sh
          echo "✓ install.sh syntax OK"

      - name: Test uninstall.sh syntax (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          bash -n uninstall.sh
          echo "✓ uninstall.sh syntax OK"

      - name: Test local install (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x install.sh
          ./install.sh --local
          test -f ~/.taco/taco
          echo "✓ Local install works"

      - name: Test local uninstall (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x uninstall.sh
          ./uninstall.sh
          test ! -d ~/.taco
          echo "✓ Uninstall works"

      - name: Test install.ps1 syntax (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $content = Get-Content install.ps1 -Raw
          # Basic syntax check by parsing
          $null = [System.Management.Automation.PSParser]::Tokenize($content, [ref]$null)
          Write-Host "✓ install.ps1 syntax OK"

      - name: Test uninstall.ps1 syntax (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $content = Get-Content uninstall.ps1 -Raw
          $null = [System.Management.Automation.PSParser]::Tokenize($content, [ref]$null)
          Write-Host "✓ uninstall.ps1 syntax OK"

  test-edge-node-versions:
    name: Edge Node ${{ matrix.node-version }} (${{ matrix.package-manager }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [23, 25] # Edge versions
        package-manager: [npm, pnpm]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup ${{ matrix.package-manager }}
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm --version
              ;;
            pnpm)
              npm install -g pnpm@9
              pnpm --version
              ;;
          esac
        shell: bash

      - name: Install dependencies
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              # Generate package-lock.json from package.json (pnpm is canonical lockfile)
              npm install --package-lock-only --ignore-scripts
              npm ci
              ;;
            pnpm)
              pnpm install --frozen-lockfile
              ;;
          esac
        shell: bash

      - name: Run tests
        run: |
          case "${{ matrix.package-manager }}" in
            npm)
              npm test
              ;;
            pnpm)
              pnpm test
              ;;
          esac
        shell: bash
        continue-on-error: true # Edge versions may have issues

  summary:
    name: Package Manager Test Summary
    needs: [test-package-managers, test-install-scripts, test-edge-node-versions]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Package Manager Compatibility Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tested Combinations" >> $GITHUB_STEP_SUMMARY
          echo "- **Package Managers:** npm, pnpm, yarn" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Versions:** 20, 22, 24 (LTS) + 23, 25 (Edge)" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** Ubuntu, Windows, macOS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package Manager Tests | ${{ needs.test-package-managers.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Install Script Tests | ${{ needs.test-install-scripts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge Node Tests | ${{ needs.test-edge-node-versions.result }} |" >> $GITHUB_STEP_SUMMARY
