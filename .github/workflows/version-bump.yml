name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  version-bump:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'RELEASE')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '22.x'

      - name: Determine bump type
        id: bump
        run: |
          BUMP_TYPE="patch"
          PR_LABELS="${{ toJson(github.event.pull_request.labels.*.name) }}"

          if [[ $PR_LABELS == *"MAJOR"* ]]; then
            BUMP_TYPE="major"
          elif [[ $PR_LABELS == *"MINOR"* ]]; then
            BUMP_TYPE="minor"
          fi

          echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Bumping: $BUMP_TYPE"

      - name: Bump version
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.BUMP_TYPE }}
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh

      - name: Get new version
        id: version
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "chore: bump version to v${{ steps.version.outputs.NEW_VERSION }} [skip ci]"

      - name: Create Pull Request for version bump
        env:
          GH_TOKEN: ${{ secrets.PAT_TACO_TOKEN }}
        run: |
          BRANCH="version-bump/v${{ steps.version.outputs.NEW_VERSION }}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore: bump version to v${{ steps.version.outputs.NEW_VERSION }}" \
            --body "Automated version bump after PR merge."
          gh pr merge "$BRANCH" --squash --delete-branch --admin

      - name: Wait for squash merge to land
        env:
          GH_TOKEN: ${{ secrets.PAT_TACO_TOKEN }}
        run: |
          BRANCH="version-bump/v${{ steps.version.outputs.NEW_VERSION }}-${{ github.run_id }}"

          # Get the merge commit SHA from the PR
          for i in {1..20}; do
            MERGE_SHA=$(gh pr view "$BRANCH" --json mergeCommit --jq '.mergeCommit.oid' 2>/dev/null || true)
            if [[ -n "$MERGE_SHA" && "$MERGE_SHA" != "null" ]]; then
              echo "MERGE_SHA=$MERGE_SHA" >> $GITHUB_ENV
              echo "Merge commit: $MERGE_SHA"
              break
            fi
            echo "Waiting for merge commit... ($i/20)"
            sleep 5
          done

          # Confirm it's reachable on origin/master
          for i in {1..20}; do
            git fetch origin master
            if git merge-base --is-ancestor "$MERGE_SHA" origin/master 2>/dev/null; then
              echo "Commit is on origin/master"
              break
            fi
            echo "Commit not yet on master... ($i/20)"
            sleep 5
          done

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.PAT_TACO_TOKEN }}
        run: |
          git fetch origin master
          git tag -a "v${{ steps.version.outputs.NEW_VERSION }}" "$MERGE_SHA" -m "Release v${{ steps.version.outputs.NEW_VERSION }}"
          git remote set-url origin "https://x-access-token:${{ secrets.PAT_TACO_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin "v${{ steps.version.outputs.NEW_VERSION }}"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ secrets.PAT_TACO_TOKEN }}
        run: |
          gh workflow run release.yml --ref "v${{ steps.version.outputs.NEW_VERSION }}"

      - name: Remove labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = ['RELEASE', 'MAJOR', 'MINOR', 'PATCH'];
            for (const label of labels) {
              try {
                await github.rest.issues.removeLabel({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch (error) {
                console.log(`Label ${label} not found or already removed.`);
              }
            }
