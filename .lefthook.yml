pre-commit:
  parallel: false
  commands:
    format:
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
      glob: '*.{ts,js,json,md,yml,yaml}'
      exclude:
        - dist/**
        - node_modules/**

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm run typecheck
      glob: '*.ts'
      exclude:
        - dist/**
        - node_modules/**
    lint:
      run: pnpm run lint
      glob: '*.{ts,js}'
      exclude:
        - dist/**
        - node_modules/**
    test:
      run: pnpm test

commit-msg:
  commands:
    conventional-commits:
      run: npx commitlint --edit {1}
